<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - NavCart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--primary:#6366f1;--dark:#0f172a;--gray-100:#f1f5f9;--gray-500:#64748b;--radius-xl:1.5rem}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Inter,sans-serif;background:linear-gradient(135deg,var(--dark) 0%,#1e1b4b 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
        .login-card{background:white;padding:3rem;border-radius:var(--radius-xl);width:100%;max-width:420px;box-shadow:0 25px 50px rgba(0,0,0,0.3)}
        .logo{text-align:center;margin-bottom:2rem}
        .logo i{font-size:3rem;color:var(--primary)}
        .logo h2{margin-top:0.5rem;color:var(--dark)}
        .form-group{margin-bottom:1.5rem}
        .form-group label{display:block;margin-bottom:0.5rem;font-weight:500;color:var(--dark)}
        .form-group input{width:100%;padding:0.875rem 1rem;border:2px solid #e2e8f0;border-radius:0.75rem;font-size:1rem;outline:none;transition:all 0.3s}
        .form-group input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
        .btn{width:100%;padding:1rem;background:linear-gradient(135deg,var(--primary),#4f46e5);color:white;border:none;border-radius:0.75rem;font-weight:600;font-size:1rem;cursor:pointer;transition:all 0.3s}
        .btn:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(99,102,241,0.4)}
        .hint{text-align:center;margin-top:1.5rem;font-size:0.875rem;color:var(--gray-500)}
        .error{color:#ef4444;text-align:center;margin-bottom:1rem;display:none}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <i class="fas fa-shopping-bag"></i>
            <h2>NavCart Admin</h2>
        </div>
        <div class="error" id="error">Invalid username or password</div>
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="admin" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="admin123" required>
            </div>
            <button type="submit" class="btn"><i class="fas fa-sign-in-alt"></i> Login</button>
        </form>
        <div class="hint">Default: admin / admin123</div>
    </div>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if (adminLogin(u, p)) {
                window.location.href = 'admin-dashboard.html';
            } else {
                document.getElementById('error').style.display = 'block';
            }
        });
    </script>
</body>
</html>
