<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - NavCart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .auth-container{max-width:400px;margin:4rem auto;padding:2rem}
        .auth-card{background:white;border-radius:1.5rem;padding:2.5rem;border:1px solid var(--gray-200)}
        .auth-header{text-align:center;margin-bottom:2rem}
        .form-group{margin-bottom:1.25rem}
        .form-group label{display:block;margin-bottom:0.5rem;font-weight:500}
        .form-group input{width:100%;padding:1rem;border:2px solid var(--gray-200);border-radius:0.75rem}
        .btn-primary{width:100%;padding:1rem;background:var(--primary);color:white;border:none;border-radius:0.75rem;font-weight:600;cursor:pointer}
        .auth-footer{text-align:center;margin-top:1.5rem}
    </style>
</head>
<body style="background:var(--gray-100);min-height:100vh">
    <header class="header">
        <div class="container">
            <div class="header-inner">
                <a href="index.html" class="logo">
                    <div class="logo-icon"><i class="fas fa-shopping-bag"></i></div>
                    <span class="logo-text">Nav<span>Cart</span></span>
                </a>
            </div>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-lock fa-2x" style="color:var(--primary);margin-bottom:1rem"></i>
                <h1>Reset Password</h1>
                <p style="color:var(--gray-500)">Enter your phone number</p>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="10-digit number" maxlength="10">
            </div>
            
            <button class="btn-primary" onclick="resetPassword()">
                <i class="fas fa-paper-plane"></i> Send Reset Link
            </button>
        </div>

        <div class="auth-footer">
            <a href="user-login.html">Back to Login</a>
        </div>
    </div>

    <script>
        function resetPassword() {
            const phone = document.getElementById('phone').value;
            if (phone.length !== 10) {
                alert('Enter valid phone number');
                return;
            }

            const users = JSON.parse(localStorage.getItem('navcart_users')) || [];
            if (!users.find(u => u.phone === phone)) {
                alert('Phone number not registered!');
                return;
            }

            alert('Demo: Password reset link sent to phone! In production, this would send an SMS.');
            alert('For demo, contact admin to reset password.');
        }
    </script>
</body>
</html>
