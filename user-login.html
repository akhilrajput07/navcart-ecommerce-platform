<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NavCart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .auth-container{max-width:400px;margin:4rem auto;padding:2rem}
        .auth-card{background:white;border-radius:1.5rem;padding:2.5rem;border:1px solid var(--gray-200);box-shadow:0 10px40px rgba(0,0,0,0.1)}
        .auth-header{text-align:center;margin-bottom:2rem}
        .form-group{margin-bottom:1.25rem}
        .form-group label{display:block;margin-bottom:0.5rem;font-weight:500}
        .form-group input{width:100%;padding:1rem;border:2px solid var(--gray-200);border-radius:0.75rem;font-family:inherit}
        .form-group input:focus{outline:none;border-color:var(--primary)}
        .btn-primary{width:100%;padding:1rem;background:var(--primary);color:white;border:none;border-radius:0.75rem;font-weight:600;cursor:pointer}
        .btn-primary:hover{background:#4f46e5}
        .auth-footer{text-align:center;margin-top:1.5rem;color:var(--gray-500)}
        .auth-footer a{color:var(--primary);font-weight:600}
        .forgot{text-align:right;margin-top:-1rem;margin-bottom:1rem}
        .forgot a{color:var(--primary);font-size:0.875rem}
    </style>
</head>
<body style="background:var(--gray-100);min-height:100vh">
    <header class="header">
        <div class="container">
            <div class="header-inner">
                <a href="index.html" class="logo">
                    <div class="logo-icon"><i class="fas fa-shopping-bag"></i></div>
                    <span class="logo-text">Nav<span>Cart</span></span>
                </a>
            </div>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-sign-in-alt fa-2x" style="color:var(--primary);margin-bottom:1rem"></i>
                <h1>Login</h1>
                <p style="color:var(--gray-500)">Welcome back!</p>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="Enter 10-digit number" maxlength="10">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>
            <div class="forgot">
                <a href="forgot-password.html">Forgot Password?</a>
            </div>
            
            <button class="btn-primary" onclick="loginUser()">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </div>

        <div class="auth-footer">
            Don't have an account? <a href="user-signup.html">Sign Up</a>
        </div>
    </div>

    <script>
        function loginUser() {
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;

            if (!phone || !password) {
                alert('Fill all fields');
                return;
            }

            const users = JSON.parse(localStorage.getItem('navcart_users')) || [];
            const user = users.find(u => u.phone === phone && u.password === password);

            if (user) {
                localStorage.setItem('navcart_current_user', JSON.stringify(user));
                window.location.href = 'my-orders.html';
            } else {
                alert('Invalid phone or password!');
            }
        }
    </script>
</body>
</html>
