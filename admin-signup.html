<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Sign Up - NavCart</title>
    <meta name="description" content="Secure admin registration for NavCart">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="css/admin-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="admin-body">
    <div class="admin-login-container">
        <div class="admin-login-box">
            <div class="admin-logo">
                <i class="fas fa-store"></i>
                <span>Nav<span>Cart</span> Admin</span>
            </div>
            <h2>Create Admin Account</h2>
            <p class="security-notice">
                <i class="fas fa-shield-alt"></i> Secure registration for authorized personnel only.
            </p>
            
            <form class="admin-form" onsubmit="return handleAdminSignup(event)">
                <div class="form-group">
                    <label for="adminName">Full Name</label>
                    <input type="text" id="adminName" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="adminEmail">Email Address</label>
                    <input type="email" id="adminEmail" required placeholder="admin@navcart.com">
                </div>
                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <input type="password" id="adminPassword" required placeholder="Create a strong password">
                    <small class="password-hint">Min 8 characters, include uppercase, number & symbol</small>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" required placeholder="Confirm your password">
                </div>
                <div class="form-group">
                    <label for="adminCode">Admin Access Code</label>
                    <input type="text" id="adminCode" required placeholder="Enter admin access code">
                    <small class="security-hint">Contact super admin for access code</small>
                </div>
                <button type="submit" class="admin-btn btn-primary">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>
            
            <div class="login-footer">
                <p>Already have an account? <a href="admin-login.html">Login here</a></p>
                <p class="security-badge"><i class="fas fa-lock"></i> SSL Secured Connection</p>
                <p>© 2024 NavCart. All rights reserved.</p>
            </div>
        </div>
    </div>

    <script>
        function handleAdminSignup(e) {
            e.preventDefault();
            const password = document.getElementById('adminPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return false;
            }
            
            if (password.length < 8) {
                alert('Password must be at least 8 characters long!');
                return false;
            }
            
            // Demo signup - in production, this would register with a secure backend
            alert('Admin account created successfully! Please login.');
            window.location.href = 'admin-login.html';
            return false;
        }
    </script>
</body>
</html>
